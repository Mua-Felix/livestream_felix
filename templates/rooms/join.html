{% extends "base.html" %}
{% block title %}Join Meeting — LiveStream Felix{% endblock %}

{% block content %}
<div style="max-width:480px;margin:80px auto;">
  <div class="lsf-card" style="text-align:center;padding:40px;">
    <div class="lsf-logo-icon" style="width:56px;height:56px;font-size:24px;margin:0 auto 16px;"><i class="fa-solid fa-right-to-bracket"></i></div>
    <h2 style="font-family:var(--font-display);font-size:24px;font-weight:700;margin-bottom:8px;">Join a Meeting</h2>
    <p style="color:var(--text-3);margin-bottom:28px;">Enter the meeting code to join</p>

    {% if error %}
    <div style="background:rgba(255,78,106,0.1);border:1px solid rgba(255,78,106,0.3);border-radius:var(--radius-sm);padding:12px;margin-bottom:20px;color:var(--red);font-size:14px;">
      <i class="fa-solid fa-circle-exclamation" style="margin-right:6px;"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="lsf-form-group" style="text-align:left;">
        <label class="lsf-label">Meeting Code</label>
        <input class="lsf-input" type="text" name="code" placeholder="e.g. ABC123XY90"
               style="text-transform:uppercase;letter-spacing:0.12em;font-size:18px;font-weight:700;text-align:center;"
               maxlength="20" autofocus>
      </div>
      <div class="lsf-form-group" style="text-align:left;">
        <label class="lsf-label">Password <span style="color:var(--text-4);">(if required)</span></label>
        <input class="lsf-input" type="password" name="password" placeholder="Leave blank if none">
      </div>
      <button type="submit" class="lsf-btn lsf-btn-primary lsf-btn-full lsf-btn-lg">
        <i class="fa-solid fa-right-to-bracket"></i> Join Meeting
      </button>
    </form>

    <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border);">
      <p style="color:var(--text-3);font-size:14px;margin-bottom:12px;">Or start your own</p>
      <a href="{% url 'rooms:instant' %}" class="lsf-btn lsf-btn-cyan lsf-btn-full">
        <i class="fa-solid fa-bolt"></i> Start Instant Meeting
      </a>
    </div>
  </div>
</div>
{% endblock %}
